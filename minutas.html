<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minuta de Reunión | D-Mentes</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="minutes-body">
    <!-- Overlay de Acceso -->
    <div id="access-overlay" class="access-overlay">
        <div class="access-box">
            <img src="img/Logo dmente transparente.png" alt="D-Mentes">
            <h2>Acceso Restringido Consultores</h2>
            <input type="password" id="access-code" placeholder="Código de Acceso">
            <button onclick="checkAccess()" class="btn-access">Ingresar al Sistema</button>
        </div>
    </div>

    <div id="minutes-content" style="display: none;">
    <nav>
        <div class="nav-logo">
            <img src="img/Logo dmente transparente.png" alt="D-Mentes Logo">
            <span class="logo-text">&lt;/d&gt;<span class="logo-suffix">mentes</span></span>
        </div>
        <button class="hamburger" id="hamburger-button" aria-label="Menú de navegación" aria-expanded="false" aria-controls="nav-links">
            <span class="hamburger-icon"></span>
            <span class="hamburger-icon"></span>
            <span class="hamburger-icon"></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Volver al Sitio</a></li>
        </ul>
    </nav>

    <div class="minutes-container">
        <header class="minutes-header">
            <div>
                <img src="img/Logo dmente transparente.png" alt="D-Mentes">
                <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;">Consultoría IT & Analistas de Sistemas</p>
            </div>
            <div class="minutes-header-title">
                <h1>MINUTA DE REUNIÓN</h1>
                <p id="current-date" style="font-weight: bold; color: var(--accent);"></p>
            </div>
        </header>

        <form action="https://formsubmit.co/ajax/contacto@dementes.net.ar" method="POST" class="minutes-form" id="minutes-form">
            <!-- Configuración FormSubmit -->
            <input type="hidden" name="_subject" value="Nueva Minuta de Reunión - D-Mentes">
            
            <div class="minutes-grid">
                <div class="form-group">
                    <label>Cliente / Empresa</label>
                    <input type="text" name="cliente" placeholder="Nombre del cliente" required>
                </div>
                <div class="form-group">
                    <label>Proyecto</label>
                    <input type="text" name="proyecto" placeholder="Nombre del proyecto">
                </div>
                <div class="form-group">
                    <label>Participantes D-Mentes</label>
                    <input type="text" name="analistas" placeholder="Ej: Javier, Sebastian..." required>
                </div>
                <div class="form-group">
                    <label>Participantes Cliente</label>
                    <input type="text" name="participantes_cliente" placeholder="Nombres de los presentes">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Temas Tratados</label>
                <textarea name="temas" rows="6" placeholder="Resumen de la discusión..." required></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Acuerdos y Decisiones</label>
                <textarea name="acuerdos" rows="4" placeholder="¿A qué se llegó en la reunión?"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Próximos Pasos / Tareas Pendientes</label>
                <textarea name="pendientes" rows="4" placeholder="Acciones futuras y responsables..."></textarea>
            </div>

            <div class="btn-print">
                <button type="submit" class="button btn-submit-minute">Enviar por Email</button>
                <button type="button" onclick="window.print()" class="button btn-print-minute">Descargar PDF / Imprimir</button>
            </div>
        </form>
    </div>

    <script>
        // Lógica de Acceso y Persistencia
        function checkAccess() {
            const code = document.getElementById('access-code').value;
            // Código de acceso: DM2025
            if (code === 'DM2025') {
                document.getElementById('access-overlay').style.display = 'none';
                document.getElementById('minutes-content').style.display = 'block';
                sessionStorage.setItem('dm_authorized', 'true');
            } else {
                alert('Código incorrecto. Acceso denegado.');
            }
        }

        // Ejecutar al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            // Verificar si ya está autorizado en esta sesión
            if (sessionStorage.getItem('dm_authorized') === 'true') {
                document.getElementById('access-overlay').style.display = 'none';
                document.getElementById('minutes-content').style.display = 'block';
            }

            // Configurar fecha actual
            const dateElement = document.getElementById('current-date');
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            dateElement.innerText = new Date().toLocaleDateString('es-ES', options);
        });

        // Lógica de envío similar a la de index.html
        document.getElementById('minutes-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const response = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
            if (response.ok) alert('Minuta enviada correctamente.');
            else alert('Error al enviar.');
        });

        // Lógica para el menú hamburguesa en la página de minutas
        const hb = document.getElementById('hamburger-button');
        const nl = document.getElementById('nav-links');
        hb.addEventListener('click', () => {
            nl.classList.toggle('active');
            hb.classList.toggle('active');
        });
    </script>
</body>
</html>
